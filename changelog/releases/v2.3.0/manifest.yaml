title: OpenAI provider for grounded web workflows
intro: >-
  This release adds an OpenAI provider for web_search, web_answer, and web_research,
  including pi managed async research workflow. It gives you an API-key-based alternative
  to Codex when you want grounded answers and longer research runs without depending
  on a local Codex installation.
